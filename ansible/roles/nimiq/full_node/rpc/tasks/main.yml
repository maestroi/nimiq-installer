---
- name: Create a network
  community.docker.docker_network:
    name: webserver

- name: Render nginx.conf
  ansible.builtin.template:
    src: nginx.conf.j2
    dest: opt/nimiq/configuration/default.conf
    owner: root
    group: root
    mode: "0755"
  register: nginx_config

- name: Run Nginx
  community.docker.docker_container:
    name: "Nginx"
    restart_policy: unless-stopped
    networks:
      - name: "webserver"
    image: nginx:latest
    restart: "{{ true if nginx_config.changed else false }}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/opt/nimiq/configuration/default.conf:/etc/nginx/conf.d/default.conf"
    labels:
      "com.centurylinklabs.watchtower.enable": "true"
      "com.centurylinklabs.watchtower.scope": "public"

- name: Render client.toml
  ansible.builtin.template:
    src: client.toml.j2
    dest: /opt/nimiq/client.toml
    owner: root
    group: root
    mode: "0755"
  register: node_config

- name: Run rpc node container
  community.docker.docker_container:
    name: "rpcnode"
    restart_policy: unless-stopped
    networks:
      - name: "webserver"
    image: "{{ nimiq.image }}"
    restart: "{{ true if node_config.changed else false }}"
    published_ports:
      - "{{ nimiq.rpc_listen_port }}:{{ nimiq.rpc_listen_port }}"
      - "{{ nimiq.rpc_port }}:{{ nimiq.rpc_port }}"
      - "{{ nimiq.metrics_ports }}:{{ nimiq.metrics_ports }}"
    volumes:
      - /opt/nimiq/configuration/client.toml:/home/nimiq/.nimiq/client.toml
      - /opt/nimiq/data:/home/nimiq/.nimiq/testalbatross-history-consensus
    labels:
      "com.centurylinklabs.watchtower.enable": "true"
      "com.centurylinklabs.watchtower.scope": "public"

- name: Allow Allow 80
  community.general.ufw:
    rule: allow
    port: 80
    proto: tcp

- name: Allow 443
  community.general.ufw:
    rule: allow
    port: 443
    proto: tcp

- name: Allow seeding
  community.general.ufw:
    rule: allow
    port: "{{ nimiq.listen_port }}"
    proto: tcp
